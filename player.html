<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل الأفلام</title>
    <style>
        body { background-color: #0d0d0d; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; margin: 0; }
        .header-area { display: flex; justify-content: space-between; width: 100%; max-width: 1200px; align-items: center; }
        .back-btn { background: #333; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; border: 1px solid #444; }
        .back-btn:hover { background: #444; }
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1200px; margin-top: 10px; }
        .video-container { flex: 2; }
        video { width: 100%; border-radius: 8px; background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .subs { height: 550px; overflow-y: scroll; flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #2d2d2d; }
        .sub-item { padding: 12px; border-bottom: 1px solid #2d2d2d; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .sub-item:hover { background: #2d2d2d; color: #00aaff; }
        .time { color: #00aaff; font-size: 0.85em; display: block; }
    </style>
</head>
<body>

    <div class="header-area">
        <h2>سينما التعلم 🌐🎥</h2>
        <a href="index.html" class="back-btn">⬅️ العودة للرئيسية</a>
    </div>

    <div class="main-wrapper">
        <div class="video-container">
            <video id="vid" controls preload="auto">
                <source id="videoSource" src="" type="video/mp4">
            </video>
        </div>
        <div id="subs" class="subs">
            <p style="text-align: center; color: #888;">جاري جلب أسطر الترجمة...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('vid');
        const videoSource = document.getElementById('videoSource');
        const subsContainer = document.getElementById('subs');

        const onlineVideoUrl = sessionStorage.getItem('onlineVideoUrl');
        const onlineSrtUrl = sessionStorage.getItem('onlineSrtUrl');

        if (!onlineVideoUrl || !onlineSrtUrl) {
            window.location.href = 'index.html';
        }

        videoSource.src = onlineVideoUrl;
        video.load();

        function timeToSeconds(time) {
            try {
                const cleanTime = time.trim().replace('.', ',');
                const parts = cleanTime.split(':');
                const s = parts[2].split(',');
                return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseInt(s[0], 10) + (parseInt(s[1], 10) / 1000);
            } catch(e) { return 0; }
        }

        fetch(onlineSrtUrl)
            .then(res => res.text())
            .then(srtText => {
                subsContainer.innerHTML = '';
                const cleanSrtText = srtText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
                const blocks = cleanSrtText.split(/\n\s*\n/);
                
                blocks.forEach(block => {
                    const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    if(lines.length >= 2) {
                        const timeLineIndex = lines.findIndex(l => l.includes('-->'));
                        if (timeLineIndex !== -1 && lines[timeLineIndex + 1]) {
                            const timeMatch = lines[timeLineIndex].match(/(\d{2}:\d{2}:\d{2}[.,]\d{3})/);
                            if (timeMatch) {
                                const time = timeMatch[1];
                                const seconds = timeToSeconds(time);
                                const textLines = lines.slice(timeLineIndex + 1);
                                const currentText = textLines.join(' ');
                                
                                if (currentText.toLowerCase().includes('webvtt')) return;

                                const div = document.createElement('div');
                                div.className = 'sub-item';
                                div.innerHTML = `
                                    <span class="time">⏱️ ${time.split(/[.,]/)[0]}</span>
                                    <span><strong>${currentText}</strong></span>
                                `;
                                
                                div.onclick = () => { 
                                    video.currentTime = seconds; 
                                    video.play().catch(e => {});
                                };
                                subsContainer.appendChild(div);
                            }
                        }
                    }
                });
            });
    </script>
</body>
</html>
