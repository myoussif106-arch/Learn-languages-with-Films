<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السينما العالمية التفاعلية</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d0d0d; 
            color: #fff; 
            padding: 30px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }
        .card { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.8); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            border: 1px solid #2d2d2d; 
        }
        h2 { color: #00aaff; margin-bottom: 20px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 6px; 
            border: 1px solid #333; 
            background: #222; 
            color: #fff; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #00aaff; 
            border: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        button:hover { background: #0088cc; }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card">
        <h2>السينما العالمية التفاعلية 🎬</h2>
        <p>أدخل رابط الفيلم المباشر وارفع ملف الترجمة لبدء العرض السريع</p>
        
        <form id="cinemaForm" onsubmit="processGlobalCinema(event)">
            <input type="url" id="videoUrlInput" placeholder="https://example.com/movie.mp4" dir="ltr" required>
            <input type="file" id="srtFile" accept=".srt,.vtt" required>
            <button type="submit" id="uploadBtn">تشغيل الفيلم الآن 🚀</button>
        </form>
    </div>

    <script>
        const BACKEND_URL = ""; 

        async function processGlobalCinema(event) {
            // منع الصفحة من التحويل التلقائي لضمان انتظار السيرفر
            event.preventDefault();

            const videoUrl = document.getElementById('videoUrlInput').value.trim();
            const srtFile = document.getElementById('srtFile').files[0];
            const btn = document.getElementById('uploadBtn');

            if (!videoUrl || !srtFile) return alert("من فضلك أدخل رابط الفيلم واختر ملف الترجمة أولاً!");

            btn.disabled = true;
            btn.innerText = "جاري الحفظ في قاعدة البيانات أونلاين... ⏳";

            const reader = new FileReader();
            reader.onload = async function(e) {
                const rawText = e.target.result;

                // تقسيم وأخذ جزء لضمان العبور السريع من حماية حجم فيرسال
                const lines = rawText.split('\n');
                const shortLines = lines.slice(0, 200); 
                const optimizedText = shortLines.join('\n').trim();

                try {
                    // إجبار المتصفح على انتظار استجابة السيرفر السحابي كاملة
                    const response = await fetch(`/api/upload`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            videoUrl: videoUrl, 
                            srtText: optimizedText, 
                            srtName: srtFile.name 
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || "سيرفر فيرسال رفض الطلب فنياً");
                    }

                    const data = await response.json();
                    
                    if (data && data.srtId) {
                        // تنظيف الـ Session القديمة لضمان عدم تكرار الداتا القديمة مع التوجيه
                        sessionStorage.removeItem('onlineVideoUrl');
                        sessionStorage.removeItem('onlineSrtUrl');

                        // تخزين الداتا الجديدة الفعلية المربوطة بالـ ID الجديد من Neon
                        sessionStorage.setItem('onlineVideoUrl', videoUrl);
                        sessionStorage.setItem('onlineSrtUrl', `/api/srt/${data.srtId}`);
                        
                        // التحويل الآمن لصفحة المشغل
                        window.location.href = 'player.html';
                    } else {
                        alert("السيرفر لم يرجع معرف الترجمة بشكل صحيح!");
                        btn.disabled = false;
                        btn.innerText = "تشغيل الفيلم الآن 🚀";
                    }

                } catch (err) { 
                    console.error("تفاصيل الخطأ الفعلي:", err);
                    alert("خطأ اتصال: " + err.message); 
                    btn.disabled = false; 
                    btn.innerText = "تشغيل الفيلم الآن 🚀";
                }
            };
            reader.readAsText(srtFile);
        }
    </script>
</body>
</html>
