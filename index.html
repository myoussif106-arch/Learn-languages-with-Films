<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluentFlix</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0d0d0d; 
            color: #fff; 
            padding: 30px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }
        .card { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.8); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            border: 1px solid #2d2d2d; 
        }
        h2 { color: #00aaff; margin-bottom: 10px; font-size: 28px; letter-spacing: 1px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 6px; 
            border: 1px solid #333; 
            background: #222; 
            color: #fff; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #00aaff; 
            border: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s;
        }
        button:hover { background: #0088cc; }
        button:disabled { background: #444; cursor: not-allowed; }
        
        .nav-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }
        .nav-link:hover { color: #00aaff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>FluentFlix 🎬</h2>
        <p>Enter direct video URL and upload your subtitle file to start learning</p>
        
        <div id="cinemaForm">
            <input type="url" id="videoUrlInput" placeholder="https://example.com/movie.mp4" required>
            <input type="file" id="srtFile" accept=".srt,.vtt" required>
            <button type="button" id="uploadBtn" onclick="processGlobalCinema()">Play Movie Now 🚀</button>
        </div>

        <a href="/" class="nav-link">Back to Home</a>
    </div>

    <script>
        async function processGlobalCinema() {
            const videoUrl = document.getElementById('videoUrlInput').value.trim();
            const srtFile = document.getElementById('srtFile').files[0];
            const btn = document.getElementById('uploadBtn');

            if (!videoUrl || !srtFile) {
                return alert("Please enter the video URL and select a subtitle file first!");
            }

            btn.disabled = true;
            btn.innerText = "Saving to database... ⏳";

            const reader = new FileReader();
            reader.onload = async function(e) {
                const rawText = e.target.result;

                // تقصيص أسطر الترجمة لـ 200 سطر لتفادي قيود حجم الطلب في فيرسال المجاني
                const lines = rawText.split('\n');
                const shortLines = lines.slice(0, 200); 
                const optimizedText = shortLines.join('\n').trim();

                try {
                    // إرسال طلب الرفع الصريح للباك إيند السحابي
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ 
                            videoUrl: videoUrl, 
                            srtText: optimizedText, 
                            srtName: srtFile.name 
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || "Server rejected the upload request");
                    }

                    const data = await response.json();
                    
                    if (data && data.srtId) {
                        // تنظيف الجلسة القديمة لضمان تسجيل القيم الجديدة بدون تداخل
                        sessionStorage.removeItem('onlineVideoUrl');
                        sessionStorage.removeItem('onlineSrtUrl');

                        // تخزين الداتا الحية الجديدة القادمة من قاعدة بيانات Neon
                        sessionStorage.setItem('onlineVideoUrl', videoUrl);
                        sessionStorage.setItem('onlineSrtUrl', `/api/srt/${data.srtId}`);
                        
                        // التوجيه لصفحة المشغل بعد التأكد التام من نجاح الحفظ في الداتا بيز
                        window.location.href = 'player.html';
                    } else {
                        alert("The server did not return a valid subtitle ID!");
                        btn.disabled = false;
                        btn.innerText = "Play Movie Now 🚀";
                    }

                } catch (err) { 
                    console.error("Error details:", err);
                    alert("Connection Error: " + err.message); 
                    btn.disabled = false; 
                    btn.innerText = "Play Movie Now 🚀";
                }
            };
            
            reader.onerror = function() {
                alert("Error reading the subtitle file from your device!");
                btn.disabled = false;
                btn.innerText = "Play Movie Now 🚀";
            };

            reader.readAsText(srtFile);
        }
    </script>
</body>
</html>
